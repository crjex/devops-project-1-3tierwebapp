services:
  web:
    image: nginx:latest
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html

  database:
    build: ./database
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - database
    links:
      - database:database   # <--- CRITICAL: Explicitly forces local DNS registration inside this container
    env_file: .env
    environment:
      - FLASK_ENV=development
      - DB_HOST=database
    ports:
      - "5001:5001"
    volumes:
      - ./frontend:/app/frontend

volumes:
  postgres_data:
