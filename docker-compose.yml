services:
  web:
    image: nginx:latest
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html
    networks:
      todo_net:

  database:
    build: ./database
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      todo_net:
        ipv4_address: 172.20.0.5  # <--- Hardcodes the database to this specific IP

  backend:
    build: ./backend
    depends_on:
      - database
    env_file: .env
    environment:
      - FLASK_ENV=development
      - DB_HOST=172.20.0.5       # <--- Direct IP routing bypasses Docker DNS completely!
    ports:
      - "5001:5001"
    volumes:
      - ./frontend:/app/frontend
    networks:
      todo_net:

networks:
  todo_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
