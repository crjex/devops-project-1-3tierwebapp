name: CI/CD Todo Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-deploy:
    # Forces the job to run locally on your VM runner instead of GitHub's cloud
    runs-on: ubuntu-latest

    # Centralized global environment variables for the steps below
    env:
      APP_IP: '192.168.65.132'
      APP_HOST: 'vagrant@192.168.65.132'
      DEPLOY_DIR: '/home/vagrant/todoapp'

    steps:
    # 1. Pull the codebase into your runner directory
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up Python for test execution
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 3. Compile python files to check for typos/syntax errors
    - name: Run Backend Syntax Test
      run: |
        cd backend
        find src -name "*.py" -exec python -m py_compile {} +

    # 4. Spin up the SSH key manager using your GitHub Secret
    - name: Setup SSH Keys
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.APP_SERVER_SSH_KEY }}

    # 5. Authorize the App Server to prevent manual 'yes/no' prompts
    - name: Scan Remote Host Keys
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H "${APP_IP}" >> ~/.ssh/known_hosts

    # 6. Push the code files cleanly to the target server
    - name: Deploy Files via Rsync
      run: |
        ssh ${APP_HOST} "mkdir -p ${DEPLOY_DIR}"
        rsync -az --delete --exclude venv --exclude .git --exclude postgres_data \
          -e "ssh" \
          ./ ${APP_HOST}:${DEPLOY_DIR}/

    # 7. Securely drop the production credentials onto the app server
    - name: Create Remote Environment File
      run: |
        ssh ${APP_HOST} "cat << 'EOF' > ${DEPLOY_DIR}/.env
        DB_NAME=${{ vars.DB_NAME }}
        DB_USER=${{ vars.DB_USER }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        EOF"

    # 8. Rebuild and launch the clean infrastructure stack
    - name: Start Docker Containers
      run: |
        ssh ${APP_HOST} "
          cd ${DEPLOY_DIR} &&
          docker compose --env-file .env -p mytodoapp down -v &&
          docker compose --env-file .env -p mytodoapp up --build --force-recreate -d &&
          docker compose -p mytodoapp ps
        "
